<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dream OS v2.1 - AI Agent Super</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0f1e">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #0a0f1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(16,185,129,0.3);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .ai-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(168,85,247,0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 10px;
            z-index: 9999;
            border: 1px solid rgba(168,85,247,0.3);
        }
        .ai-badge i {
            color: #a855f7;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p style="margin-top: 20px; color: #10b981;">DREAM OS BOOTING...</p>
        <p style="margin-top: 8px; color: #64748b; font-size: 12px;">AI Agent Super v7.0 | LLM Ready</p>
    </div>
    <div id="toast-container"></div>
    <div id="app-shell"></div>
    <div class="ai-badge">
        <i class="fas fa-brain"></i> AI Agent Super v7.0 | Multi-LLM
    </div>
    
    <script type="module">
        import { aiService } from './services/ai-service.js';
        import { syncService } from './services/sync-service.js';
        import { notificationService } from './services/notification-service.js';
        import { dreamOS } from './core/system.js';
        import { dbRecovery } from './core/database-recovery.js';
        import { ghostScanner } from './core/ghost-scanner.js';
        
        // Global services
        window.aiService = aiService;
        window.syncService = syncService;
        window.notificationService = notificationService;
        window.ghostScanner = ghostScanner;
        window.dbRecovery = dbRecovery;
        
        // Initialize all services
        console.log('%c🤖 DREAM OS AI AGENT SUPER v7.0', 'color: #a855f7; font-size: 16px; font-weight: bold;');
        console.log('%cMulti-LLM Support | Real-time Sync | Push Notifications', 'color: #10b981;');
        console.log('%cType: aiService.chat("your message") - Talk to AI', 'color: #64748b;');
        console.log('%cType: ghostScanner.scan() - System Diagnosis', 'color: #64748b;');
        
        try {
            // Initialize services
            await aiService.init();
            await notificationService.init();
            
            // Setup Supabase
            const supabase = window.supabase.createClient(
                'https://lfavawkzvdhdpaaplaiq.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmYXZhd2t6dmRoZHBhYXBsYWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjc0NjgsImV4cCI6MjA4OTUwMzQ2OH0.EhwnhAd20lUVaWHHB51UdWCGWxkyTaWIrsPY8xvhwE00'
            );
            await syncService.init(supabase);
            
            // Initialize core system
            await dreamOS.init();
            
            // Show welcome notification
            await notificationService.notify({
                title: 'Dream OS AI Agent',
                body: 'System ready! AI Agent Super v7.0 active.',
                icon: './assets/img/icon-192.png'
            });
            
            // Load auth module
            const authModule = await dreamOS.loadModule('auth');
            const app = await authModule.render({
                user: null,
                toast: (msg) => console.log(msg),
                aiService: aiService,
                syncService: syncService,
                notificationService: notificationService
            });
            
            document.getElementById('app-shell').innerHTML = app;
            
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }
            }, 1000);
            
        } catch (error) {
            console.error('Fatal error:', error);
            dreamOS.enterGhostMode('system_init_failed');
            
            document.getElementById('app-shell').innerHTML = `
                <div style="text-align:center;padding:50px;">
                    <i class="fas fa-ghost" style="font-size:64px;color:#a855f7;"></i>
                    <h2 style="color:#a855f7;">Ghost Mode Active</h2>
                    <p>AI Agent in emergency recovery mode</p>
                    <div style="margin-top:20px;background:rgba(0,0,0,0.5);padding:20px;border-radius:12px;text-align:left;">
                        <p><strong>Error:</strong> ${error.message}</p>
                        <button onclick="ghostScanner.scan()" style="margin-top:10px;background:#a855f7;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;">
                            <i class="fas fa-search"></i> Run System Scan
                        </button>
                        <button onclick="ghostScanner.recover()" style="margin-top:10px;margin-left:10px;background:#10b981;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;">
                            <i class="fas fa-heartbeat"></i> Emergency Recovery
                        </button>
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                const loading = document.getElementById('loading-screen');
                if (loading) loading.style.display = 'none';
            }, 1000);
        }
    </script>
</body>
</html>
