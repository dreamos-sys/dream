<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="./"> <title>Dream OS v2.1 | Professional Edition</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="shell.css">
  
  <style>
    /* Splash Screen Sederhana agar Profesional */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0b1120;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
    }
    .loader-arabic {
      font-family: 'Scheherazade New', serif;
      font-size: 2rem;
      color: #10b981;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader-arabic">بسم الله</div>
    <p>Initializing System...</p>
  </div>

  <div id="app-shell"></div>
  
  <div id="toast-container"></div>

  <script type="module">
    import { initServices } from './shared/services/index.js';
    
    // Hilangkan splash screen setelah inisialisasi
    window.addEventListener('load', () => {
      const splash = document.getElementById('loading-screen');
      if (splash) {
        setTimeout(() => {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }, 800);
      }
    });
  </script>
  
  <script type="module" src="shell.js"></script>

</body>
</html>
