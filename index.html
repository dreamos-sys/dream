<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <title>Dream OS v2.1 - Sovereign Enterprise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --bg-tertiary: #1e293b;
            --text-primary: #e2e8f0;
            --text-muted: #94a3b8;
            --text-subtle: #64748b;
            --color-primary: #10b981;
            --color-primary-light: #34d399;
            --color-primary-dark: #059669;
            --color-primary-glow: rgba(16, 185, 129, 0.4);
            --color-secondary: #06b6d4;
            --color-accent: #8b5cf6;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-bg-heavy: rgba(15, 23, 42, 0.85);
            --glass-blur: blur(24px) saturate(180%);
            --glass-border: 1px solid rgba(16, 185, 129, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            --font-arabic: 'Amiri', serif;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
        }

        html, body { height: 100%; overflow: hidden; }
        
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.5s;
        }

        /* Loading Screen */
        #loading-screen {            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        #loading-screen.hide { display: none; }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(16, 185, 129, 0.2);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Glass Header */
        .glass-header {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-3px);
            border-color: var(--color-primary);
            box-shadow: 0 12px 40px rgba(16,185,129,0.2);        }

        /* Toast */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--glass-bg-heavy);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 12px 20px;
            box-shadow: var(--glass-shadow);
            color: var(--text-primary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
            max-width: 320px;
            border-left: 4px solid var(--color-primary);
        }

        .toast-success { border-left-color: var(--color-primary); }
        .toast-error { border-left-color: #ef4444; }
        .toast-warning { border-left-color: #f59e0b; }
        .toast-info { border-left-color: var(--color-secondary); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg-heavy);
            backdrop-filter: var(--glass-blur);
            border-top: var(--glass-border);
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
            z-index: 100;
        }
        .nav-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: var(--radius-md);
            transition: all 0.2s;
        }

        .nav-item.active {
            background: rgba(16,185,129,0.15);
            color: var(--color-primary);
        }

        .nav-item i { font-size: 1.2rem; }
        .nav-item span { font-size: 9px; font-weight: 600; }

        /* Module Card */
        .module-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .module-card:hover {
            transform: translateY(-5px);
            border-color: var(--color-primary);
            box-shadow: 0 12px 40px rgba(16,185,129,0.2);
        }
        .module-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 8px 20px var(--color-primary-glow);
        }

        .module-icon i { color: white; font-size: 1.5rem; }
        .module-label { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px;
            text-align: center;
        }

        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
        .stat-label { font-size: 10px; color: var(--text-muted); }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--color-primary-glow);
            width: 100%;
            margin-top: 12px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--color-primary-glow);
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 12px;
        }

        .btn-back:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        /* Category Section */
        .category-section { margin-bottom: 24px; animation: fadeInUp 0.5s ease; }
        .category-title { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 600; }

        /* Module Container */
        .module-container { display: none; padding: 16px; padding-bottom: 140px; animation: fadeInUp 0.5s ease; }
        .module-container.active { display: block; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 4px; }

        /* Islamic Header */
        .islamic-header {
            text-align: center;
            padding: 16px;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.08) 0%, transparent 100%);
        }
        .bismillah {
            font-family: var(--font-arabic);
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 8px;
            text-shadow: 0 0 20px var(--color-primary-glow);        }
        .shalawat {
            font-family: var(--font-arabic);
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: var(--color-primary-light);
            opacity: 0.9;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--color-primary);
            opacity: 0.7;
            margin-bottom: 6px;
        }

        /* Neural Status */
        .neural-status {
            background: linear-gradient(135deg, rgba(16,185,129,0.1), transparent);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 16px;
        }

        /* Theme Cards */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .theme-card {
            background: var(--bg-secondary);
            border: 2px solid transparent;
            border-radius: var(--radius-lg);
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .theme-card:hover { transform: translateY(-3px); }
        .theme-card.active { border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-glow); }
        .theme-preview {
            width: 100%;
            height: 80px;
            border-radius: var(--radius-md);
            margin-bottom: 12px;
        }
        /* Responsive */
        @media (min-width: 769px) {
            #app-shell { max-width: 1200px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div style="text-align:center;">
            <div class="loader"></div>
            <p style="margin-top:1rem;color:var(--color-primary);font-size:0.875rem;">Bismillah bi idznillah</p>
            <h1 style="margin-top:0.5rem;color:var(--text-primary);font-size:2rem;letter-spacing:2px;">DREAM OS</h1>
            <p style="margin-top:0.5rem;color:var(--text-muted);font-size:0.75rem;">v2.1 Sovereign Enterprise</p>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- App Shell -->
    <div id="app-shell"></div>

    <!-- JavaScript -->
    <script>
        // ════════════════════════════════════════════
        // DREAM OS v2.1 - COMPLETE JAVASCRIPT
        // ════════════════════════════════════════════

        // Toast System
        function toast(msg, type = 'success') {
            const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
            const container = document.getElementById('toast-container');
            if (container) {
                container.appendChild(el);
                setTimeout(() => { el.style.opacity='0'; setTimeout(() => el.remove(), 350); }, 3500);
            }
            if ('vibrate' in navigator) navigator.vibrate(50);
        }

        // Theme Manager
        const ThemeManager = {
            themes: {
                'dark-glass': {
                    name: '🌙 Dark Glass',
                    colors: {                        '--bg-primary': '#020617', '--bg-secondary': '#0f172a', '--text-primary': '#e2e8f0',
                        '--text-muted': '#94a3b8', '--color-primary': '#10b981', '--color-secondary': '#06b6d4'
                    }
                },
                'light-minimal': {
                    name: '☀️ Light Minimal',
                    colors: {
                        '--bg-primary': '#ffffff', '--bg-secondary': '#f5f5f7', '--text-primary': '#1d1d1f',
                        '--text-muted': '#86868b', '--color-primary': '#0071e3', '--color-secondary': '#00c7fd'
                    }
                },
                'cyberpunk': {
                    name: '🤖 Cyberpunk',
                    colors: {
                        '--bg-primary': '#0a0a0f', '--bg-secondary': '#12121a', '--text-primary': '#ffffff',
                        '--text-muted': '#b0b0b0', '--color-primary': '#00ff88', '--color-secondary': '#00ffff'
                    }
                },
                'islamic-modern': {
                    name: '🕌 Islamic Modern',
                    colors: {
                        '--bg-primary': '#1a1f2e', '--bg-secondary': '#242b3d', '--text-primary': '#ffffff',
                        '--text-muted': '#94a3b8', '--color-primary': '#d4af37', '--color-secondary': '#10b981'
                    }
                },
                'material': {
                    name: '📱 Material',
                    colors: {
                        '--bg-primary': '#121212', '--bg-secondary': '#1e1e1e', '--text-primary': '#ffffff',
                        '--text-muted': '#b0b0b0', '--color-primary': '#bb86fc', '--color-secondary': '#03dac6'
                    }
                }
            },
            getCurrent() { return localStorage.getItem('dreamos-theme') || 'dark-glass'; },
            set(themeName) {
                const theme = this.themes[themeName];
                if (!theme) return false;
                Object.entries(theme.colors).forEach(([k, v]) => document.documentElement.style.setProperty(k, v));
                localStorage.setItem('dreamos-theme', themeName);
                toast(`🎨 Theme: ${theme.name}`, 'success');
                return true;
            },
            getAvailable() {
                return Object.entries(this.themes).map(([k, v]) => ({ id: k, name: v.name, colors: v.colors }));
            },
            init() { this.set(this.getCurrent()); }
        };

        // ════════════════════════════════════════════
        // ALL MODULES - COMPLETE LIST        // ════════════════════════════════════════════
        const MODULES = {
            'home': { icon: 'fa-grid-2', label: 'Home', category: 'system' },
            'booking': { icon: 'fa-calendar-check', label: 'Booking', category: 'ops' },
            'sekuriti': { icon: 'fa-shield-halved', label: 'Security', category: 'security' },
            'k3': { icon: 'fa-helmet-safety', label: 'K3', category: 'security' },
            'ai-panel': { icon: 'fa-brain', label: 'AI Panel', category: 'ai' },
            'ai-speak': { icon: 'fa-microchip', label: 'AI Speak', category: 'ai' },
            'prediction': { icon: 'fa-chart-line', label: 'Prediction', category: 'ai' },
            'asset': { icon: 'fa-cubes', label: 'Asset', category: 'ops' },
            'stok': { icon: 'fa-boxes', label: 'Stok', category: 'ops' },
            'maintenance': { icon: 'fa-gears', label: 'Maintenance', category: 'ops' },
            'commandcenter': { icon: 'fa-chess-queen', label: 'Command Center', category: 'system' },
            'settings': { icon: 'fa-sliders', label: 'Settings', category: 'system' },
            'profile': { icon: 'fa-user', label: 'Profile', category: 'system' },
            'qr': { icon: 'fa-qrcode', label: 'QR', category: 'system' },
            'janitor-indoor': { icon: 'fa-broom', label: 'Janitor Indoor', category: 'facility' },
            'janitor-outdoor': { icon: 'fa-leaf', label: 'Janitor Outdoor', category: 'facility' },
            'weather': { icon: 'fa-cloud-sun', label: 'Weather', category: 'facility' },
            'reports': { icon: 'fa-file-alt', label: 'Reports', category: 'system' },
            'ghost': { icon: 'fa-ghost', label: 'Ghost Core', category: 'special', hidden: true }
        };

        // Current Module State
        let currentModule = 'home';

        // ════════════════════════════════════════════
        // RENDER FUNCTIONS
        // ════════════════════════════════════════════

        function renderHome() {
            const categories = {
                'ai': { label: '🧠 Neural Intelligence', modules: ['ai-panel', 'ai-speak', 'prediction'] },
                'ops': { label: '⚙️ Operations', modules: ['booking', 'asset', 'stok', 'maintenance'] },
                'security': { label: '🛡️ Security & Safety', modules: ['sekuriti', 'k3'] },
                'facility': { label: '🏢 Facility', modules: ['janitor-indoor', 'janitor-outdoor', 'weather'] },
                'system': { label: '🔧 System', modules: ['commandcenter', 'settings', 'profile', 'qr', 'reports'] }
            };

            return `
                <div class="module-container active" id="module-home">
                    <!-- Header -->
                    <header class="glass-header" id="ghost-trigger-zone" style="cursor:default;">
                        <div class="status-bar">
                            <span>📍 DEPOK CORE | <span id="clock">--:--</span></span>
                            <span>ISO 27001-55001 ✅</span>
                        </div>
                        <div class="islamic-header">
                            <h1 class="bismillah">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</h1>
                            <p class="shalawat">اَللهم صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>                        </div>
                        <div style="font-size:9px;text-align:center;color:var(--text-subtle);margin-top:6px;">
                            ${navigator.platform || 'Device'} | ${navigator.onLine ? 'Online' : 'Offline'}
                        </div>
                    </header>

                    <!-- Main Content -->
                    <main style="padding:16px;padding-bottom:140px;">
                        <!-- Neural Status -->
                        <div class="neural-status">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                                <h3 style="color:var(--color-primary);font-size:0.9rem;font-weight:600;">
                                    <i class="fas fa-network-wired" style="margin-right:6px;"></i> NEURAL CORE ACTIVE
                                </h3>
                                <span style="color:var(--color-primary);font-size:10px;font-family:var(--font-mono);">SECURE</span>
                            </div>
                            <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:10px;">
                                <span>🧠 AI: <span style="color:var(--color-primary);">ONLINE</span></span>
                                <span>🔮 PREDICTION: <span style="color:var(--color-primary);">ACTIVE</span></span>
                                <span>👻 GHOST: <span style="color:var(--text-subtle);">STANDBY</span></span>
                            </div>
                        </div>

                        <!-- Stats -->
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Total Modules</div>
                                <div class="stat-value" style="color:var(--color-primary);">19</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Active Users</div>
                                <div class="stat-value" style="color:var(--color-secondary);">24</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Pending</div>
                                <div class="stat-value" style="color:#f59e0b;">3</div>
                            </div>
                        </div>

                        <!-- Module Categories -->
                        ${Object.entries(categories).map(([cat, data]) => `
                            <div class="category-section">
                                <h4 class="category-title">${data.label}</h4>
                                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;">
                                    ${data.modules.map(key => MODULES[key] ? `
                                        <div class="glass-card" onclick="loadModule('${key}')">
                                            <div class="module-icon"><i class="fas ${MODULES[key].icon}"></i></div>
                                            <div class="module-label">${MODULES[key].label}</div>
                                        </div>
                                    ` : '').join('')}                                </div>
                            </div>
                        `).join('')}
                    </main>

                    <!-- Bottom Navigation -->
                    <nav class="bottom-nav">
                        <div class="nav-container">
                            <button class="nav-item active" data-nav="home" onclick="loadModule('home')">
                                <i class="fas fa-grid-2"></i><span>Home</span>
                            </button>
                            <button class="nav-item" data-nav="booking" onclick="loadModule('booking')">
                                <i class="fas fa-calendar-check"></i><span>Booking</span>
                            </button>
                            <button class="nav-item" data-nav="sekuriti" onclick="loadModule('sekuriti')">
                                <i class="fas fa-shield-halved"></i><span>Security</span>
                            </button>
                            <button class="nav-item" data-nav="settings" onclick="loadModule('settings')">
                                <i class="fas fa-sliders"></i><span>Settings</span>
                            </button>
                        </div>
                    </nav>
                </div>
            `;
        }

        function renderBooking() {
            return `
                <div class="module-container active" id="module-booking">
                    <div style="margin-bottom:24px;">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                            <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));border-radius:14px;display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-calendar-check" style="color:white;font-size:1.5rem;"></i>
                            </div>
                            <div>
                                <h1 style="color:var(--text-primary);font-size:1.5rem;">Booking</h1>
                                <p style="color:var(--text-muted);font-size:0.875rem;">Resource Scheduling</p>
                            </div>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-label">Total Rooms</div><div class="stat-value" style="color:var(--color-primary);">4</div></div>
                        <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value" style="color:var(--color-secondary);">2</div></div>
                        <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:#f59e0b;">1</div></div>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
                        <div class="glass-card">
                            <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                                <div><h3 style="color:var(--text-primary);">Board Room A</h3><p style="color:var(--text-muted);font-size:0.75rem;">Floor 3</p></div>
                                <div style="background:rgba(16,185,129,0.15);color:var(--color-primary);padding:4px 10px;border-radius:8px;font-size:10px;">20 ppl</div>                            </div>
                            <button class="btn-primary" onclick="toast('Booking feature coming soon!', 'info')"><i class="fas fa-plus" style="margin-right:6px;"></i> Book Now</button>
                        </div>
                        <div class="glass-card">
                            <div style="display:flex;justify-content:space-between;margin-bottom:12px;">
                                <div><h3 style="color:var(--text-primary);">Meeting Room B</h3><p style="color:var(--text-muted);font-size:0.75rem;">Floor 2</p></div>
                                <div style="background:rgba(16,185,129,0.15);color:var(--color-primary);padding:4px 10px;border-radius:8px;font-size:10px;">10 ppl</div>
                            </div>
                            <button class="btn-primary" onclick="toast('Booking feature coming soon!', 'info')"><i class="fas fa-plus" style="margin-right:6px;"></i> Book Now</button>
                        </div>
                    </div>
                    <button class="btn-back" onclick="loadModule('home')">← Back to Home</button>
                </div>
            `;
        }

        function renderSettings() {
            const themes = ThemeManager.getAvailable();
            return `
                <div class="module-container active" id="module-settings">
                    <div style="margin-bottom:24px;">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
                            <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));border-radius:14px;display:flex;align-items:center;justify-content:center;">
                                <i class="fas fa-sliders" style="color:white;font-size:1.5rem;"></i>
                            </div>
                            <div>
                                <h1 style="color:var(--text-primary);font-size:1.5rem;">Settings</h1>
                                <p style="color:var(--text-muted);font-size:0.875rem;">System Configuration</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card" style="margin-bottom:16px;">
                        <h2 style="color:var(--text-primary);font-size:1.1rem;margin-bottom:16px;">🎨 Theme</h2>
                        <div class="theme-grid">
                            ${themes.map(t => `
                                <div class="theme-card ${ThemeManager.getCurrent() === t.id ? 'active' : ''}" onclick="changeTheme('${t.id}')">
                                    <div class="theme-preview" style="background:linear-gradient(135deg,${t.colors['--bg-primary']},${t.colors['--bg-secondary']});"></div>
                                    <div style="color:var(--text-primary);font-size:12px;text-align:center;">${t.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="glass-card" style="margin-bottom:16px;">
                        <h2 style="color:var(--text-primary);font-size:1.1rem;margin-bottom:16px;">ℹ️ System Info</h2>
                        <div style="padding:12px 0;border-bottom:1px solid var(--color-border);">
                            <div style="color:var(--text-muted);font-size:13px;">Version</div>
                            <div style="color:var(--text-primary);font-family:var(--font-mono);">2.1.0-Sovereign</div>
                        </div>
                        <div style="padding:12px 0;">
                            <div style="color:var(--text-muted);font-size:13px;">Storage</div>                            <div style="color:var(--text-primary);">${localStorage.length} items</div>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="clearCache()"><i class="fas fa-trash" style="margin-right:8px;"></i> Clear Cache</button>
                    <button class="btn-back" onclick="loadModule('home')">← Back to Home</button>
                </div>
            `;
        }

        function renderSekuriti() {
            return `
                <div class="module-container active" id="module-sekuriti">
                    <div style="text-align:center;padding:60px 20px;">
                        <i class="fas fa-shield-halved" style="font-size:4rem;color:var(--color-primary);margin-bottom:20px;"></i>
                        <h2 style="color:var(--text-primary);margin-bottom:10px;">Security</h2>
                        <p style="color:var(--text-muted);">Security Patrol System - Coming Soon</p>
                    </div>
                    <button class="btn-back" onclick="loadModule('home')">← Back to Home</button>
                </div>
            `;
        }

        function renderGenericModule(moduleKey) {
            const mod = MODULES[moduleKey];
            if (!mod) return renderHome();
            
            return `
                <div class="module-container active" id="module-${moduleKey}">
                    <div style="text-align:center;padding:60px 20px;">
                        <div style="width:80px;height:80px;background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 20px var(--color-primary-glow);">
                            <i class="fas ${mod.icon}" style="color:white;font-size:2.5rem;"></i>
                        </div>
                        <h2 style="color:var(--text-primary);font-size:1.5rem;margin-bottom:10px;">${mod.label}</h2>
                        <p style="color:var(--text-muted);">Module coming soon...</p>
                    </div>
                    <button class="btn-back" onclick="loadModule('home')">← Back to Home</button>
                </div>
            `;
        }

        // ════════════════════════════════════════════
        // MODULE LOADER - FIXED
        // ════════════════════════════════════════════

        function loadModule(moduleName) {
            const app = document.getElementById('app-shell');
            if (!app) return;

            // Clear all modules
            document.querySelectorAll('.module-container').forEach(m => m.remove());            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            // Render module
            let content = '';
            switch(moduleName) {
                case 'home': content = renderHome(); break;
                case 'booking': content = renderBooking(); break;
                case 'settings': content = renderSettings(); break;
                case 'sekuriti': content = renderSekuriti(); break;
                default: content = renderGenericModule(moduleName);
            }

            app.innerHTML = content;
            currentModule = moduleName;

            // Update nav active state
            const navItem = document.querySelector(`[data-nav="${moduleName}"]`);
            if (navItem) navItem.classList.add('active');

            // Haptic feedback
            if ('vibrate' in navigator) navigator.vibrate(30);
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // ════════════════════════════════════════════
            // GHOST TRIGGER - MUST RUN AFTER EVERY LOAD
            // ════════════════════════════════════════════
            setTimeout(setupGhostTrigger, 200);
            
            // Update clock
            updateClock();
            
            console.log(`[MODULE] Loaded: ${moduleName}`);
        }

        // ════════════════════════════════════════════
        // THEME CHANGER
        // ════════════════════════════════════════════

        function changeTheme(themeId) {
            ThemeManager.set(themeId);
            document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // ════════════════════════════════════════════
        // CLEAR CACHE
        // ════════════════════════════════════════════

        function clearCache() {
            if (confirm('Clear all cache and local data?')) {                localStorage.clear();
                toast('Cache cleared! Reload...', 'success');
                setTimeout(() => location.reload(), 1000);
            }
        }

        // ════════════════════════════════════════════
        // GHOST MODE - 5-TAP (FIXED!)
        // ════════════════════════════════════════════

        function setupGhostTrigger() {
            let taps = 0;
            let timeout;
            const zone = document.getElementById('ghost-trigger-zone');
            
            if (!zone) {
                console.warn('[GHOST] Trigger zone not found!');
                return;
            }

            // Remove old listener to prevent duplicates
            zone.replaceWith(zone.cloneNode(true));
            
            const newZone = document.getElementById('ghost-trigger-zone');
            
            newZone.addEventListener('click', () => {
                taps++;
                console.log(`[GHOST] Tap ${taps}/5`);
                
                if ('vibrate' in navigator) navigator.vibrate(30);
                
                if (timeout) clearTimeout(timeout);

                if (taps === 5) {
                    taps = 0;
                    console.log('[GHOST] 5 taps detected!');
                    
                    setTimeout(() => {
                        const code = prompt('🔑 GHOST ACCESS CODE:');
                        if (code === 'dreamos2026') {
                            if ('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
                            toast('👻 Ghost Mode Activated!', 'success');
                            setTimeout(() => {
                                alert('👻 GHOST MODE\n\nDeveloper Access Granted\n\nFull Ghost Dashboard coming soon!');
                            }, 500);
                        } else {
                            toast('❌ Access Denied', 'error');
                        }
                    }, 200);
                    return;                }
                
                timeout = setTimeout(() => {
                    console.log('[GHOST] Reset tap counter');
                    taps = 0;
                }, 2000);
            });
            
            console.log('[GHOST] Trigger setup complete');
        }

        // ════════════════════════════════════════════
        // CLOCK
        // ════════════════════════════════════════════

        function updateClock() {
            const clock = document.getElementById('clock');
            if (clock) {
                const now = new Date();
                clock.textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            }
        }

        // ════════════════════════════════════════════
        // INIT - FIXED
        // ════════════════════════════════════════════

        function init() {
            console.log('🚀 [DREAM OS] v2.1 Initializing...');

            // Init Theme
            ThemeManager.init();

            // Render Home
            loadModule('home');

            // Hide Loading Screen
            setTimeout(() => {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hide');
                    console.log('✅ [LOADING] Screen hidden');
                }
            }, 1500);

            // Start Clock
            updateClock();
            setInterval(updateClock, 1000);

            console.log('✅ [DREAM OS] Ready!');            console.log('🎨 5 Themes Available');
            console.log('👻 5-TAP Header for Ghost Mode');
            console.log('📦 19 Modules Loaded');
        }

        // Run Init
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
