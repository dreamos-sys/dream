<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1 Enterprise</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pearl: #0f172a; --accent: #10b981; --gold: #f59e0b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--pearl); color: #e2e8f0; overflow-x: hidden; min-height: 100vh; }
        
        /* Glassmorphism Global */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.1); border-radius: 20px; padding: 1.5rem; }
        
        /* Loading Screen */
        #loading-screen { position: fixed; inset: 0; background: #020617; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        #loading-screen.hide { opacity: 0; pointer-events: none; }
        
        /* Header Aura */
        .islamic-header { padding: 40px 20px 20px; text-align: center; background: linear-gradient(to bottom, rgba(16,185,129,0.1), transparent); }
        .status-bar { display: flex; justify-content: space-between; font-size: 9px; opacity: 0.6; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        #app-shell { min-height: 100vh; }
        
        /* Toast Notification */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10001; width: 90%; max-width: 400px; }
        
        /* Responsivitas Grid */
        .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="width: 60px; height: 60px; border: 3px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-size: 10px; letter-spacing: 3px; color: var(--accent);">DREAM OS INITIALIZING...</p>
    </div>

    <div id="toast-container"></div>
    <div id="app-shell"></div>

    <script src="shell.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Pastikan D Emas Master di QR Navigasi Selalu Center */
        .nav-item[data-target="qr"] div { animation: pulse 2s infinite ease-in-out; }
    </style>
</body>
</html>
