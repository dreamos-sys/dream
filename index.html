<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v2.1 - Sovereign Edition</title>
    
    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome & Tailwind (opsional, untuk utilitas) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- CSS Utama Dream OS -->
    <link rel="stylesheet" href="core/engine.css">
    
    <!-- Manifest PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body class="bg-slate-950 text-white">
    <div id="app-shell"></div>

    <!-- SYSTEM CORE & SECURITY -->
    <script>
        // ============================================================
        // DREAM SYSTEM UTILITIES
        // ============================================================
        window.DREAM_SYS = {
            haptic: (p = 50) => { if ('vibrate' in navigator) navigator.vibrate(p); },
            log: (type, msg) => {
                const colors = { info: '#06b6d4', success: '#10b981', warn: '#f59e0b', error: '#ef4444', ghost: '#8b5cf6' };
                console.log(`%c[DREAM ${type.toUpperCase()}] %c${msg}`, `color:${colors[type] || '#10b981'}; font-weight:bold`, 'color:inherit;');
            }
        };

        // ============================================================
        // DREAM GLOBAL OBJECT (LENGKAP)
        // ============================================================
        window.DREAM = {
            version: '2.1.0-Sovereign',
            env: 'production',
            config: {
                supabase: { 
                    url: 'https://pvznaeppaagylwddirla.supabase.co', 
                    key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo'
                },
                safeZone: { radius: 5, center: { lat: -6.4025, lng: 106.7942 } } // Depok
            },
            state: { 
                currentModule: 'home', 
                user: null, 
                isPanic: false,
                modules: new Map(),
                cache: new Map()
            },
            // Akan di-override oleh dream-core.js, tapi placeholder dulu
            load: (moduleName) => {
                console.warn(`[DREAM] Placeholder load: ${moduleName}`);
                window.DREAM_SYS.haptic(20);
            }
        };

        // ============================================================
        // GHOST BYPASS (5 TAP PADA HEADER)
        // ============================================================
        (function() {
            let taps = 0;
            let tapTimer;
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.shell-header')) return;
                taps++;
                window.DREAM_SYS.haptic(30);
                clearTimeout(tapTimer);
                if (taps === 5) {
                    taps = 0;
                    const pwd = prompt('👻 Ghost Architect Access:');
                    if (pwd === 'dreamos2026') {
                        window.DREAM.load(window.DREAM.state?.user ? 'ghost' : 'login');
                    } else {
                        alert('Access denied');
                    }
                }
                tapTimer = setTimeout(() => taps = 0, 2000);
            });
        })();
    </script>

    <!-- UTILITY SCRIPTS (defer) -->
    <script src="js/utils/prayer-time.js" defer></script>
    <script src="js/utils/battery-monitor.js" defer></script>
    <script src="js/utils/network-monitor.js" defer></script>
    <script src="js/utils/camera-scanner.js" defer></script>
    <script src="js/utils/device-fingerprint.js" defer></script>
    <script src="js/utils/geofencing.js" defer></script>
    <script src="js/utils/system-monitor.js" defer></script>
    <script src="js/utils/smart-printer.js" defer></script>
    <script src="js/utils/nfc-scanner.js" defer></script>
    <script src="js/utils/i18n.js" defer></script>
    
    <!-- ENTERPRISE SECURITY UTILITIES -->
    <script src="js/utils/system-watchdog.js" defer></script>
    <script src="js/utils/secure-vault.js" defer></script>
    <script src="js/utils/stealth-engine.js" defer></script>
    <script src="js/utils/backup-manager.js" defer></script>

    <!-- MAIN MODULES (type="module") -->
    <script type="module" src="js/dream-core.js"></script>
    <script type="module" src="js/ai-orchestrator.js"></script>
    <script type="module" src="shell.js"></script>

    <!-- SERVICE WORKER -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => window.DREAM_SYS.log('success', 'Service Worker Active'))
                    .catch(err => window.DREAM_SYS.log('error', 'SW Failed: ' + err.message));
            });
        }
    </script>
</body>
</html>
