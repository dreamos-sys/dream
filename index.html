<body>
  <!-- App Container -->
  <div id="app-shell">
    <!-- Loading State (shown while shell.js loads) -->
    <div class="loading-splash" id="loading">
      <div style="text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">🏰</div>
        <div style="font-size:1.2rem;font-weight:bold">Dream OS v2.1</div>

      </div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div id="toast-container"></div>
  
  <!-- Service Worker Registration (One-liner) -->
  <script>
    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW registered:', reg.scope))
          .catch(err => console.error('❌ SW registration failed:', err));      });
    }
  </script>
  
  <!-- Main Application Script (ES Module) -->
  <script type="module" src="./shell.js"></script>
