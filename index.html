<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dream OS v13.6 - Sovereign LUX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-deep: #020617; --bg-card: #1e293b; --emerald: #10b981; --slate-text: #94a3b8; }
        body { margin: 0; background: var(--bg-deep); font-family: sans-serif; color: white; overflow-x: hidden; }
        
        /* Header Sakral */
        .ghost-header { padding: 25px 15px; text-align: center; background: linear-gradient(to bottom, #064e3b22, transparent); }
        .bismillah { color: var(--emerald); font-size: 20px; margin-bottom: 5px; font-family: serif; }
        .shalawat { color: var(--emerald); font-size: 13px; opacity: 0.9; margin-bottom: 8px; line-height: 1.4; }
        .soul-text { font-size: 8px; letter-spacing: 3px; color: var(--slate-text); text-transform: uppercase; }

        /* Floating Nav */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px;
            background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(12px);
            border-radius: 25px; display: flex; align-items: center; justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.05); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--slate-text); font-size: 10px; cursor: pointer; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--emerald); }
        .nav-center { position: relative; top: -25px; }
        .shalawat-btn {
            width: 65px; height: 65px; background: var(--emerald); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: white;
            font-weight: bold; font-size: 14px; border: 5px solid var(--bg-deep);
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
        }

        #ghost-header-trigger { position: fixed; top: 0; right: 0; width: 60px; height: 60px; z-index: 9999; }
    </style>
</head>
<body>
    <div id="ghost-header-trigger"></div>

    <header class="ghost-header">
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="shalawat">اَللّٰهُمَّ صَلِّ عَلٰى سَيِّدِنَا مُحَمَّدٍ وَعَلٰى اٰلِ سَيِّدِنَا مُحَمَّدٍ</div>
        <div class="soul-text">THE POWER SOUL OF SHALAWAT</div>
    </header>

    <main id="root-viewport"></main>

    <nav class="bottom-nav" id="main-nav">
        <div class="nav-item active" onclick="window.DREAM.load('home')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="window.DREAM.load('k3')"><i class="fa-solid fa-triangle-exclamation"></i><span>K3</span></div>
        <div class="nav-center" onclick="window.DREAM.haptic(100)"><div class="shalawat-btn">صلوات</div></div>
        <div class="nav-item" onclick="window.DREAM.load('asset')"><i class="fa-solid fa-boxes-stacked"></i><span>Aset</span></div>
        <div class="nav-item" onclick="window.DREAM.load('settings')"><i class="fa-solid fa-gear"></i><span>Sistem</span></div>
    </nav>

    <script src="shell.js" type="module"></script>
</body>
</html>
